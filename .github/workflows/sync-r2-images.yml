name: Sync images to Cloudflare R2

on:
  push:
    branches: ['main']
    paths:
      - 'assets-src/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: sync-r2-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure S3 credentials (R2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to R2 bucket
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ ! -d "assets-src" ]; then
            echo "assets-src/ does not exist; nothing to sync."
            exit 0
          fi

          aws s3 sync "assets-src/" "s3://${R2_BUCKET}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --delete
